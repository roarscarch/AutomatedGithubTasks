name: Daily AI Commits

on:
  schedule:
    # Runs every day at 09:13 UTC (adjust to your timezone)
    - cron: "13 9 * * *"
  workflow_dispatch: # manual trigger from GitHub UI

jobs:
  daily-run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout automation repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install openai gitpython

      - name: Configure git for external repos
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config --global user.name "roarscarch"
          git config --global user.email "2020ugee082@nitjsr.ac.in"
          # Override HTTPS URLs to inject the token for all GitHub operations
          git config --global url."https://oauth2:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
          # Also auth gh CLI for repo creation
          echo "${GH_TOKEN}" | gh auth login --with-token

      - name: Run daily automation
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scheduler.py run

      - name: Persist state back to automation repo
        run: |
          git add state.json report.json automation.log
          if git diff --cached --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "chore: update run state [skip ci]"
            git push
          fi
